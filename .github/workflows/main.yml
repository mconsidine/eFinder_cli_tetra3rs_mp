name: tetra3rs_mp Build eFinder RPi Image

on:
  push:
    branches: [ dev ]

  workflow_dispatch:
    inputs:
      wifi_password:
        description: 'WiFi AP password'
        required: true
        default: '12345678'
      wifi_country:
        description: 'WiFi regulatory country code (ISO 3166-1 alpha-2)'
        required: false
        default: 'US'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - name: Install host tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y parted e2fsprogs whois \
              qemu-user-static binfmt-support

      # -----------------------------------------------------------------------
      # tetra3rs: cross-compile for aarch64 on the x86_64 runner.
      # -----------------------------------------------------------------------
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add aarch64-unknown-linux-gnu

      - name: Set up Python 3.13 (matches Trixie)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install maturin and ziglang
        run: |
          sudo apt-get install -y python3-dev
          pip install "maturin>=1.4" ziglang

      - name: Clone tetra3rs
        run: |
          git clone --depth 1 https://github.com/ssmichael1/tetra3rs.git

      - name: Build tetra3rs wheel for aarch64
        run: |
          source "$HOME/.cargo/env"
          cd tetra3rs
          maturin build --release \
              --target aarch64-unknown-linux-gnu \
              --zig \
              --out /tmp/tetra3rs-wheels
          ls -lh /tmp/tetra3rs-wheels/

      - name: Download Raspberry Pi OS Lite (arm64 / trixie)
        run: |
          wget -q --show-progress \
              https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2025-05-13/2025-05-13-raspios-trixie-arm64-lite.img.xz
          ls -lh *.xz

      - name: Decompress image
        run: |
          xz -d 2025-05-13-raspios-trixie-arm64-lite.img.xz
          ls -lh *.img
          mv 2025-05-13-raspios-trixie-arm64-lite.img 2025-10-01-raspios-trixie-arm64-lite.img

      - name: Expand image by 4 GB
        run: |
          sudo fallocate -l +4G 2025-10-01-raspios-trixie-arm64-lite.img

      - name: Mount image and resize filesystem
        run: |
          LOOP=$(sudo losetup --find --show --partscan \
              2025-10-01-raspios-trixie-arm64-lite.img)
          echo "LOOP=$LOOP" >> $GITHUB_ENV
          sudo parted -s "$LOOP" resizepart 2 100%
          sudo e2fsck -f -y "${LOOP}p2" || true
          sudo resize2fs "${LOOP}p2"

      - name: Mount root and boot filesystems
        run: |
          sudo mkdir -p /mnt/pi
          sudo mount "${LOOP}p2" /mnt/pi
          sudo mount "${LOOP}p1" /mnt/pi/boot/firmware

      - name: Define build variables
        run: |
          echo "APP_SCRIPT=eFinder_tetra3rs_mp.py"   >> $GITHUB_ENV
          echo "EF_UID=1000"                          >> $GITHUB_ENV
          echo "EF_GID=1000"                          >> $GITHUB_ENV
          echo "ROOT=/mnt/pi"                         >> $GITHUB_ENV

      - name: Base configuration (outside chroot)
        env:
          WIFI_PASSWORD: ${{ github.event.inputs.wifi_password || '12345678' }}
          WIFI_COUNTRY:  ${{ github.event.inputs.wifi_country  || 'US' }}
        run: |
          # Directories
          sudo mkdir -p $ROOT/home/efinder/Solver
          sudo mkdir -p $ROOT/home/efinder/Solver/images
          sudo mkdir -p $ROOT/home/efinder/uploads
          sudo mkdir -p $ROOT/home/efinder/tetra3rs-src
          sudo mkdir -p $ROOT/etc/NetworkManager/system-connections

          # -----------------------------------------------------------------------
          # tetra3 database
          # -----------------------------------------------------------------------
          wget -q --show-progress \
              https://github.com/ssmichael1/tetra3rs/releases/download/latest/hip_main.h5 \
              -O /tmp/hip_main.h5
          sudo cp /tmp/hip_main.h5 $ROOT/home/efinder/Solver/

          # -----------------------------------------------------------------------
          # NetworkManager AP profile
          # -----------------------------------------------------------------------
          NM=$ROOT/etc/NetworkManager/system-connections/efinder-ap.nmconnection
          sudo cp image-config/efinder-ap.nmconnection "$NM"
          sudo chmod 600 "$NM"

          # -----------------------------------------------------------------------
          # /boot/firmware/firstrun.sh
          # -----------------------------------------------------------------------
          FBSCRIPT=$ROOT/boot/firmware/firstrun.sh
          echo "#!/bin/bash"                                                                        | sudo tee    "$FBSCRIPT" > /dev/null
          echo "set -e"                                                                             | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "CURRENT_HOSTNAME=\$(cat /etc/hostname | tr -d ' \\t\\n\\r')"                      | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "if [ -f /usr/lib/raspberrypi-sys-mods/imager_custom ]; then"                       | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    /usr/lib/raspberrypi-sys-mods/imager_custom set_hostname efinder"              | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "else"                                                                              | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    echo efinder > /etc/hostname"                                                  | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    sed -i \"s/127.0.1.1.*\$CURRENT_HOSTNAME/127.0.1.1\\tefinder/g\" /etc/hosts"  | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "fi"                                                                                | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "FIRSTUSER=\$(getent passwd 1000 | cut -d: -f1)"                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "FIRSTUSERHOME=\$(getent passwd 1000 | cut -d: -f6)"                               | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "if [ -f /usr/lib/raspberrypi-sys-mods/imager_custom ]; then"                       | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    /usr/lib/raspberrypi-sys-mods/imager_custom enable_ssh"                        | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "else"                                                                              | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    systemctl enable ssh"                                                         | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "fi"                                                                                | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "if [ -f /usr/lib/raspberrypi-sys-mods/imager_custom ]; then"                       | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    /usr/lib/raspberrypi-sys-mods/imager_custom set_wlan \"$WIFI_PASSWORD\" \"\" \"$WIFI_COUNTRY\"" | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "else"                                                                              | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    NM=/etc/NetworkManager/system-connections/efinder-ap.nmconnection"         | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    nmcli connection load \"\$NM\" 2>/dev/null || true"                        | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    nmcli connection up efinder-ap 2>/dev/null || true"                        | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "fi"                                                                                | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "if [ -f /usr/lib/raspberrypi-sys-mods/imager_custom ]; then"                       | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    /usr/lib/raspberrypi-sys-mods/imager_custom set_timezone America/New_York"     | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "else"                                                                              | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    rm -f /etc/localtime"                                                         | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    echo \"America/New_York\" > /etc/timezone"                                    | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    dpkg-reconfigure -f noninteractive tzdata"                                    | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "fi"                                                                                | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "if [ -f /usr/lib/raspberrypi-sys-mods/imager_custom ]; then"                       | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    /usr/lib/raspberrypi-sys-mods/imager_custom set_locale en_US.UTF-8"            | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "fi"                                                                                | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "SUDO_USER=\$FIRSTUSER"                                                            | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "if [ \"\$FIRSTUSER\" != \"efinder\" ]; then"                                      | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    usermod -l efinder \"\$FIRSTUSER\""                                          | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    usermod -m -d /home/efinder efinder"                                          | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    groupmod -n efinder \"\$FIRSTUSER\""                                         | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    SUDO_USER=efinder"                                                            | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "fi"                                                                                | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "if [ -f /usr/lib/raspberrypi-sys-mods/imager_custom ]; then"                       | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    /usr/lib/raspberrypi-sys-mods/imager_custom set_password \"efinder\" \"\$(/usr/bin/openssl passwd -5 12345678)\"" | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "else"                                                                              | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "    echo \"efinder:\$(openssl passwd -5 '12345678')\" | chpasswd -e"               | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "fi"                                                                                | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "# Samba"                                                                           | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "(echo '12345678'; echo '12345678') | smbpasswd -s -a efinder"                      | sudo tee -a "$FBSCRIPT" > /dev/null
          echo ""                                                                                   | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "# Disable firstrun.service itself"                                                 | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "systemctl disable firstrun.service"                                               | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "rm -f /boot/firmware/firstrun.sh"                                                  | sudo tee -a "$FBSCRIPT" > /dev/null
          echo "rm -f /etc/systemd/system/firstrun.service"                                        | sudo tee -a "$FBSCRIPT" > /dev/null
          sudo chmod 755 "$FBSCRIPT"

          # -----------------------------------------------------------------------
          # /etc/systemd/system/firstrun.service
          # -----------------------------------------------------------------------
          FBSVC=$ROOT/etc/systemd/system/firstrun.service
          sudo cp image-config/firstrun.service "$FBSVC"

          # -----------------------------------------------------------------------
          # Solver scripts, web UI, and config
          # -----------------------------------------------------------------------
          sudo cp -r Solver/. $ROOT/home/efinder/Solver/

          # Stage web UI
          sudo mkdir -p $ROOT/home/efinder/webui
          sudo cp -r webui/. $ROOT/home/efinder/webui/

          # Stage the source-compiled tetra3rs wheel
          sudo cp /tmp/tetra3rs-wheels/*.whl $ROOT/home/efinder/tetra3rs-src/
          echo "  tetra3rs wheel staged: $(ls /tmp/tetra3rs-wheels/*.whl)"

          # Stage the LAN connection helper
          [ -f station.sh ] && sudo install -m 755 station.sh \
              $ROOT/home/efinder/station.sh
          [ -f sendcmd.sh ] && sudo install -m 755 sendcmd.sh \
              $ROOT/home/efinder/sendcmd.sh

          # Install efinder-ctl management script
          [ -f scripts/efinder-ctl ] && sudo install -m 755 scripts/efinder-ctl \
              $ROOT/usr/local/bin/efinder-ctl

          # Fix ownership before chroot
          sudo chown -R ${EF_UID}:${EF_GID} $ROOT/home/efinder

          echo "Base configuration complete"
          echo "LOOP=$LOOP" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # chroot step
      # -----------------------------------------------------------------------
      - name: Set up QEMU for aarch64 chroot
        run: |
          sudo update-binfmts --enable qemu-aarch64
          sudo cp /usr/bin/qemu-aarch64-static /mnt/pi/usr/bin/
          sudo mount --bind /dev       /mnt/pi/dev
          sudo mount --bind /dev/pts   /mnt/pi/dev/pts
          sudo mount --bind /proc      /mnt/pi/proc
          sudo mount --bind /sys       /mnt/pi/sys
          echo '#!/bin/sh\nexit 101' | sudo tee /mnt/pi/usr/sbin/policy-rc.d > /dev/null
          sudo chmod +x /mnt/pi/usr/sbin/policy-rc.d

      - name: Install packages and configure system in chroot
        run: |
          sudo chroot /mnt/pi /bin/bash -c "
            apt-get update -q
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
                python3-pip \
                python3-venv \
                python3-picamera2 \
                python3-numpy \
                i2c-tools \
                libi2c-dev \
                python3-smbus \
                libcamera-apps \
                apache2 \
                php \
                libapache2-mod-php \
                samba \
                samba-common-bin \
                zram-tools
          "

      - name: Set up Python virtual environment in chroot
        run: |
          sudo chroot /mnt/pi /bin/bash -c "
            python3 -m venv --system-site-packages /home/efinder/venv-efinder
            /home/efinder/venv-efinder/bin/pip install --upgrade pip
            /home/efinder/venv-efinder/bin/pip install \
                smbus2 \
                adafruit-circuitpython-bno055 \
                flask \
                scipy \
                pillow
          "

      - name: Install tetra3rs wheel in chroot
        run: |
          WHEEL=$(ls /mnt/pi/home/efinder/tetra3rs-src/*.whl | head -1)
          sudo chroot /mnt/pi /bin/bash -c "
            /home/efinder/venv-efinder/bin/pip install /home/efinder/tetra3rs-src/$(basename $WHEEL)
          "

      - name: Configure Apache for optional use
        run: |
          # Enable required Apache modules (apache2 installed but not the primary web server)
          sudo chroot /mnt/pi a2enmod rewrite
          sudo chroot /mnt/pi a2enmod php8.2 2>/dev/null || \
              sudo chroot /mnt/pi a2enmod php   2>/dev/null || true

          # Samba config
          SAMBA_CONF=$ROOT/etc/samba/smb.conf
          sudo tee -a "$SAMBA_CONF" > /dev/null < image-config/efinder-samba.conf

          APACHE_CONF=$ROOT/etc/apache2/sites-available/efinder.conf
          sudo cp image-config/efinder-apache.conf "$APACHE_CONF"

          sudo chroot /mnt/pi a2ensite efinder
          sudo chroot /mnt/pi a2dissite 000-default || true
          sudo chroot /mnt/pi usermod -aG efinder www-data || true

      - name: Write system scripts and services (outside chroot)
        env:
          WIFI_PASSWORD: ${{ github.event.inputs.wifi_password || '12345678' }}
          WIFI_COUNTRY:  ${{ github.event.inputs.wifi_country  || 'US' }}
        run: |

          # ------------------------------------------------------------------
          # apply_update.sh
          # ------------------------------------------------------------------
          APPLY=$ROOT/home/efinder/Solver/apply_update.sh
          echo "#!/bin/bash"                                                                  | sudo tee    "$APPLY" > /dev/null
          echo "set -e"                                                                      | sudo tee -a "$APPLY" > /dev/null
          echo "ZIPFILE=/home/efinder/uploads/efinder_update.zip"                           | sudo tee -a "$APPLY" > /dev/null
          echo "SOLVER_DIR=/home/efinder/Solver"                                            | sudo tee -a "$APPLY" > /dev/null
          echo "LOG=/home/efinder/uploads/update_log.txt"                                   | sudo tee -a "$APPLY" > /dev/null
          echo ""                                                                            | sudo tee -a "$APPLY" > /dev/null
          echo "if [ -f \"\$ZIPFILE\" ]; then"                                              | sudo tee -a "$APPLY" > /dev/null
          echo "    echo \"\$(date): Applying update from \$ZIPFILE\" >> \"\$LOG\""          | sudo tee -a "$APPLY" > /dev/null
          echo "    if unzip -o \"\$ZIPFILE\" -d \"\$SOLVER_DIR\"; then"                    | sudo tee -a "$APPLY" > /dev/null
          echo "        echo \"\$(date): Update applied successfully.\" >> \"\$LOG\""        | sudo tee -a "$APPLY" > /dev/null
          echo "        rm -f \"\$ZIPFILE\""                                                | sudo tee -a "$APPLY" > /dev/null
          echo "    else"                                                                    | sudo tee -a "$APPLY" > /dev/null
          echo "    echo \"Update failed --- removing zip.\""                               | sudo tee -a "$APPLY" > /dev/null
          echo "    rm -f \"\$ZIPFILE\""                                                    | sudo tee -a "$APPLY" > /dev/null
          echo "fi"                                                                          | sudo tee -a "$APPLY" > /dev/null
          sudo chmod 755 "$APPLY"
          sudo chown root:root "$APPLY"

          # ------------------------------------------------------------------
          # ap.sh helper
          # ------------------------------------------------------------------
          AP=$ROOT/home/efinder/ap.sh
          echo "#!/bin/bash"                                                                     | sudo tee    "$AP" > /dev/null
          echo "set -e"                                                                          | sudo tee -a "$AP" > /dev/null
          echo "echo \"Switching to AP mode...\""                                               | sudo tee -a "$AP" > /dev/null
          echo "ACTIVE=\$(nmcli -t -f NAME,TYPE con show --active | grep wifi | grep -v efinder-ap | cut -d: -f1)" | sudo tee -a "$AP" > /dev/null
          echo "nmcli connection down \"\$ACTIVE\" 2>/dev/null || true"                         | sudo tee -a "$AP" > /dev/null
          echo "nmcli connection up efinder-ap"                                                 | sudo tee -a "$AP" > /dev/null
          echo "echo \"AP active. SSH: ssh efinder@192.168.50.1\""                             | sudo tee -a "$AP" > /dev/null
          sudo chmod +x "$AP"
          sudo chown 1000:1000 "$AP"

          # ------------------------------------------------------------------
          # efinder-ensure-ap.sh
          # ------------------------------------------------------------------
          ENSURE_AP_SH=$ROOT/usr/local/bin/efinder-ensure-ap.sh
          echo "#!/bin/bash"                                                                           | sudo tee    "$ENSURE_AP_SH" > /dev/null
          echo "AP_PROFILE=\"efinder-ap\""                                                          | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "POLL_INTERVAL=5"                                                                      | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "MAX_POLLS=12"                                                                         | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "for i in \$(seq 1 \"\$MAX_POLLS\"); do"                                          | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "    STATE=\$(nmcli -t -f DEVICE,STATE device 2>/dev/null | grep \"^wlan0:\" | cut -d: -f2)" | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "    if [[ \"\$STATE\" == \"connected\" || \"\$STATE\" == \"activated\" ]]; then" | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "        exit 0"                                                                       | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "    fi"                                                                               | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "    sleep \"\$POLL_INTERVAL\""                                                     | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "done"                                                                                 | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "nmcli con mod \"\$AP_PROFILE\" connection.autoconnect yes connection.autoconnect-retries 0 2>/dev/null || true" | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          echo "nmcli con up \"\$AP_PROFILE\""                                                    | sudo tee -a "$ENSURE_AP_SH" > /dev/null
          sudo chmod 755 "$ENSURE_AP_SH"
          sudo chown root:root "$ENSURE_AP_SH"

          # ------------------------------------------------------------------
          # Systemd service units
          # ------------------------------------------------------------------

          # cpu-performance
          CPU_SVC=$ROOT/etc/systemd/system/cpu-performance.service
          echo "[Unit]"                                                                          | sudo tee    "$CPU_SVC" > /dev/null
          echo "Description=Set CPU governor to performance mode"                               | sudo tee -a "$CPU_SVC" > /dev/null
          echo "After=sysinit.target"                                                           | sudo tee -a "$CPU_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$CPU_SVC" > /dev/null
          echo "[Service]"                                                                      | sudo tee -a "$CPU_SVC" > /dev/null
          echo "Type=oneshot"                                                                   | sudo tee -a "$CPU_SVC" > /dev/null
          echo "RemainAfterExit=yes"                                                           | sudo tee -a "$CPU_SVC" > /dev/null
          echo "ExecStart=/bin/sh -c 'echo performance | tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor'" | sudo tee -a "$CPU_SVC" > /dev/null
          echo "StandardOutput=journal"                                                         | sudo tee -a "$CPU_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$CPU_SVC" > /dev/null
          echo "[Install]"                                                                      | sudo tee -a "$CPU_SVC" > /dev/null
          echo "WantedBy=multi-user.target"                                                    | sudo tee -a "$CPU_SVC" > /dev/null

          # wifi-powersave-off
          WPS_SVC=$ROOT/etc/systemd/system/wifi-powersave-off.service
          echo "[Unit]"                                                                          | sudo tee    "$WPS_SVC" > /dev/null
          echo "Description=Disable WiFi power save on wlan0"                                   | sudo tee -a "$WPS_SVC" > /dev/null
          echo "After=NetworkManager.service sys-subsystem-net-devices-wlan0.device"           | sudo tee -a "$WPS_SVC" > /dev/null
          echo "Wants=NetworkManager.service"                                                   | sudo tee -a "$WPS_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$WPS_SVC" > /dev/null
          echo "[Service]"                                                                      | sudo tee -a "$WPS_SVC" > /dev/null
          echo "Type=oneshot"                                                                   | sudo tee -a "$WPS_SVC" > /dev/null
          echo "RemainAfterExit=yes"                                                           | sudo tee -a "$WPS_SVC" > /dev/null
          echo "ExecStart=/bin/sh -c '/usr/sbin/iw dev wlan0 set power_save off 2>/dev/null || /usr/sbin/iwconfig wlan0 power off 2>/dev/null || true'" | sudo tee -a "$WPS_SVC" > /dev/null
          echo "StandardOutput=journal"                                                         | sudo tee -a "$WPS_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$WPS_SVC" > /dev/null
          echo "[Install]"                                                                      | sudo tee -a "$WPS_SVC" > /dev/null
          echo "WantedBy=multi-user.target"                                                    | sudo tee -a "$WPS_SVC" > /dev/null

          # efinder-update (OTA)
          UPD_SVC=$ROOT/etc/systemd/system/efinder-update.service
          echo "[Unit]"                                                                          | sudo tee    "$UPD_SVC" > /dev/null
          echo "Description=eFinder OTA update checker"                                        | sudo tee -a "$UPD_SVC" > /dev/null
          echo "Before=efinder.service"                                                         | sudo tee -a "$UPD_SVC" > /dev/null
          echo "After=local-fs.target"                                                          | sudo tee -a "$UPD_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$UPD_SVC" > /dev/null
          echo "[Service]"                                                                      | sudo tee -a "$UPD_SVC" > /dev/null
          echo "Type=oneshot"                                                                   | sudo tee -a "$UPD_SVC" > /dev/null
          echo "RemainAfterExit=yes"                                                           | sudo tee -a "$UPD_SVC" > /dev/null
          echo "User=root"                                                                      | sudo tee -a "$UPD_SVC" > /dev/null
          echo "WorkingDirectory=/home/efinder"                                                | sudo tee -a "$UPD_SVC" > /dev/null
          echo "ExecStart=/bin/bash /home/efinder/Solver/apply_update.sh"                      | sudo tee -a "$UPD_SVC" > /dev/null
          echo "StandardOutput=journal"                                                         | sudo tee -a "$UPD_SVC" > /dev/null
          echo "StandardError=journal"                                                          | sudo tee -a "$UPD_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$UPD_SVC" > /dev/null
          echo "[Install]"                                                                      | sudo tee -a "$UPD_SVC" > /dev/null
          echo "WantedBy=multi-user.target"                                                    | sudo tee -a "$UPD_SVC" > /dev/null

          # efinder main service
          # RuntimeDirectory=efinder creates /run/efinder (mode 0775, owner efinder)
          # before the service starts, ensuring the maint socket can be bound.
          EF_SVC=$ROOT/etc/systemd/system/efinder.service
          echo "[Unit]"                                                                          | sudo tee    "$EF_SVC" > /dev/null
          echo "Description=eFinder tetra3rs_mp plate solver"                                  | sudo tee -a "$EF_SVC" > /dev/null
          echo "After=local-fs.target network.target efinder-update.service"                   | sudo tee -a "$EF_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$EF_SVC" > /dev/null
          echo "[Service]"                                                                      | sudo tee -a "$EF_SVC" > /dev/null
          echo "Type=simple"                                                                    | sudo tee -a "$EF_SVC" > /dev/null
          echo "User=efinder"                                                                   | sudo tee -a "$EF_SVC" > /dev/null
          echo "WorkingDirectory=/home/efinder/Solver"                                         | sudo tee -a "$EF_SVC" > /dev/null
          echo "Environment=PATH=/home/efinder/venv-efinder/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" | sudo tee -a "$EF_SVC" > /dev/null
          echo "RuntimeDirectory=efinder"                                                       | sudo tee -a "$EF_SVC" > /dev/null
          echo "RuntimeDirectoryMode=0775"                                                      | sudo tee -a "$EF_SVC" > /dev/null
          echo "ExecStartPre=/bin/sleep 2"                                                     | sudo tee -a "$EF_SVC" > /dev/null
          echo "ExecStart=/home/efinder/venv-efinder/bin/python /home/efinder/Solver/${APP_SCRIPT}" | sudo tee -a "$EF_SVC" > /dev/null
          echo "Restart=on-failure"                                                             | sudo tee -a "$EF_SVC" > /dev/null
          echo "RestartSec=15"                                                                  | sudo tee -a "$EF_SVC" > /dev/null
          echo "StartLimitIntervalSec=120"                                                      | sudo tee -a "$EF_SVC" > /dev/null
          echo "StartLimitBurst=4"                                                              | sudo tee -a "$EF_SVC" > /dev/null
          echo "StandardOutput=journal"                                                         | sudo tee -a "$EF_SVC" > /dev/null
          echo "StandardError=journal"                                                          | sudo tee -a "$EF_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$EF_SVC" > /dev/null
          echo "[Install]"                                                                      | sudo tee -a "$EF_SVC" > /dev/null
          echo "WantedBy=multi-user.target"                                                    | sudo tee -a "$EF_SVC" > /dev/null

          # efinder-webui service (Flask web UI on port 80)
          # Runs as root so it can bind port 80 and access /run/efinder/maint.sock.
          WEBUI_SVC=$ROOT/etc/systemd/system/efinder-webui.service
          echo "[Unit]"                                                                          | sudo tee    "$WEBUI_SVC" > /dev/null
          echo "Description=eFinder Web UI (Flask)"                                            | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "After=network.target efinder.service"                                          | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "Wants=efinder.service"                                                         | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "[Service]"                                                                      | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "Type=simple"                                                                    | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "User=root"                                                                      | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "WorkingDirectory=/home/efinder/webui"                                          | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "Environment=PATH=/home/efinder/venv-efinder/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "ExecStart=/home/efinder/venv-efinder/bin/python app.py"                        | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "Restart=on-failure"                                                             | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "RestartSec=10"                                                                  | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "StandardOutput=journal"                                                         | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "StandardError=journal"                                                          | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "[Install]"                                                                      | sudo tee -a "$WEBUI_SVC" > /dev/null
          echo "WantedBy=multi-user.target"                                                    | sudo tee -a "$WEBUI_SVC" > /dev/null

          # ------------------------------------------------------------------
          # Samba firstboot service
          # ------------------------------------------------------------------
          SMB_FB=$ROOT/usr/local/bin/efinder-samba-firstboot.sh
          echo "#!/bin/bash"                                                                    | sudo tee    "$SMB_FB" > /dev/null
          echo "(echo '12345678'; echo '12345678') | smbpasswd -s -a efinder"                  | sudo tee -a "$SMB_FB" > /dev/null
          echo "systemctl disable efinder-samba-firstboot.service"                             | sudo tee -a "$SMB_FB" > /dev/null
          echo "rm -f /etc/systemd/system/efinder-samba-firstboot.service"                     | sudo tee -a "$SMB_FB" > /dev/null
          echo "rm -f /usr/local/bin/efinder-samba-firstboot.sh"                               | sudo tee -a "$SMB_FB" > /dev/null
          echo "systemctl daemon-reload"                                                        | sudo tee -a "$SMB_FB" > /dev/null
          sudo chmod 755 "$SMB_FB"

          SMB_SVC=$ROOT/etc/systemd/system/efinder-samba-firstboot.service
          echo "[Unit]"                                                                         | sudo tee    "$SMB_SVC" > /dev/null
          echo "Description=eFinder Samba first-boot password setup"                           | sudo tee -a "$SMB_SVC" > /dev/null
          echo "After=smbd.service"                                                            | sudo tee -a "$SMB_SVC" > /dev/null
          echo "Wants=smbd.service"                                                            | sudo tee -a "$SMB_SVC" > /dev/null
          echo "ConditionPathExists=/usr/local/bin/efinder-samba-firstboot.sh"                 | sudo tee -a "$SMB_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$SMB_SVC" > /dev/null
          echo "[Service]"                                                                      | sudo tee -a "$SMB_SVC" > /dev/null
          echo "Type=oneshot"                                                                   | sudo tee -a "$SMB_SVC" > /dev/null
          echo "ExecStart=/bin/bash /usr/local/bin/efinder-samba-firstboot.sh"                 | sudo tee -a "$SMB_SVC" > /dev/null
          echo "RemainAfterExit=yes"                                                           | sudo tee -a "$SMB_SVC" > /dev/null
          echo "StandardOutput=journal"                                                         | sudo tee -a "$SMB_SVC" > /dev/null
          echo "StandardError=journal"                                                          | sudo tee -a "$SMB_SVC" > /dev/null
          echo ""                                                                               | sudo tee -a "$SMB_SVC" > /dev/null
          echo "[Install]"                                                                      | sudo tee -a "$SMB_SVC" > /dev/null
          echo "WantedBy=multi-user.target"                                                    | sudo tee -a "$SMB_SVC" > /dev/null

          # efinder-ensure-ap service
          ENSURE_AP_SVC=$ROOT/etc/systemd/system/efinder-ensure-ap.service
          echo "[Unit]"                                                                               | sudo tee    "$ENSURE_AP_SVC" > /dev/null
          echo "Description=Ensure eFinder Wi-Fi AP is active"                                      | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "After=NetworkManager.service network.target"                                         | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "Wants=NetworkManager.service"                                                        | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo ""                                                                                     | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "[Service]"                                                                           | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "Type=oneshot"                                                                        | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "ExecStart=/usr/local/bin/efinder-ensure-ap.sh"                                      | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "RemainAfterExit=yes"                                                                 | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "TimeoutStartSec=120"                                                                 | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo ""                                                                                     | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "[Install]"                                                                           | sudo tee -a "$ENSURE_AP_SVC" > /dev/null
          echo "WantedBy=multi-user.target"                                                         | sudo tee -a "$ENSURE_AP_SVC" > /dev/null

          # ------------------------------------------------------------------
          # Zram swap configuration
          # ------------------------------------------------------------------
          sudo cp image-config/zramswap "$ROOT/etc/default/zramswap"

          # ------------------------------------------------------------------
          # Enable services via symlinks
          # apache2 is installed but NOT enabled; efinder-webui serves port 80.
          # ------------------------------------------------------------------
          WANTS=$ROOT/etc/systemd/system/multi-user.target.wants
          sudo mkdir -p "$WANTS"
          for SVC in cpu-performance wifi-powersave-off efinder-update efinder \
                     efinder-webui smbd nmbd efinder-samba-firstboot efinder-ensure-ap; do
              sudo ln -sf /etc/systemd/system/${SVC}.service \
                  "$WANTS/${SVC}.service" 2>/dev/null || true
          done
          sudo ln -sf /lib/systemd/system/zramswap.service \
              "$WANTS/zramswap.service" 2>/dev/null || true
          sudo ln -sf /lib/systemd/system/ssh.service \
              $ROOT/etc/systemd/system/multi-user.target.wants/ssh.service 2>/dev/null || true

          # ------------------------------------------------------------------
          # Fix final ownership
          # ------------------------------------------------------------------
          sudo chown -R 1000:1000 $ROOT/home/efinder
          sudo chmod a+rwx $ROOT/home/efinder/uploads
          sudo chmod a+rwx $ROOT/home/efinder/Solver/images
          sudo chmod a+rwx $ROOT/home/efinder

      - name: Run raspi-config and image slimming in chroot
        run: |
          sudo chroot /mnt/pi raspi-config nonint do_i2c 0        2>/dev/null || true
          sudo chroot /mnt/pi raspi-config nonint do_serial_cons 1 2>/dev/null || true

          sudo chroot /mnt/pi apt-get purge -y \
              python3-pip \
              2>/dev/null || true

          sudo chroot /mnt/pi apt-get autoremove -y
          sudo chroot /mnt/pi apt-get clean

          sudo rm -rf /mnt/pi/usr/share/doc/*
          sudo rm -rf /mnt/pi/usr/share/man/*
          sudo rm -rf /mnt/pi/usr/share/info/*

          sudo find /mnt/pi/usr/share/locale -mindepth 1 -maxdepth 1 \
              ! -name 'en' ! -name 'en_US' ! -name 'locale.alias' \
              -exec rm -rf {} + 2>/dev/null || true

          sudo chroot /mnt/pi /usr/sbin/locale-gen
          sudo chroot /mnt/pi /usr/sbin/update-locale LANG=en_US.UTF-8
          sudo chroot /mnt/pi locale -a

          sudo find /mnt/pi/home/efinder/venv-efinder -name '__pycache__' \
              -exec rm -rf {} + 2>/dev/null || true
          sudo find /mnt/pi/usr/lib/python3 -name '__pycache__' \
              -exec rm -rf {} + 2>/dev/null || true

          sudo rm -rf /mnt/pi/home/efinder/tetra3rs-src

          echo "  Image slimming complete."
          df -h /mnt/pi

      - name: Teardown chroot
        if: always()
        run: |
          sudo rm -f  /mnt/pi/usr/sbin/policy-rc.d
          sudo rm -f  /mnt/pi/usr/bin/qemu-aarch64-static
          sudo umount /mnt/pi/sys       2>/dev/null || true
          sudo umount /mnt/pi/proc      2>/dev/null || true
          sudo umount /mnt/pi/dev/pts   2>/dev/null || true
          sudo umount /mnt/pi/dev       2>/dev/null || true
          sudo umount /mnt/pi/boot/firmware 2>/dev/null || true
          sudo umount /mnt/pi           2>/dev/null || true
          sudo losetup -d "$LOOP"       2>/dev/null || true

      - name: Compress final image
        run: |
          xz -T0 -z 2025-10-01-raspios-trixie-arm64-lite.img
          echo "Compression complete"

      - name: Generate artifact name
        run: |
          echo "ARTIFACT_NAME=efinder_tetra3rs_mp_$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: 2025-10-01-raspios-trixie-arm64-lite.img.xz
          compression-level: 0
          if-no-files-found: error
          retention-days: 14

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.ARTIFACT_NAME }}
          files: 2025-10-01-raspios-trixie-arm64-lite.img.xz
          tag_name: "dev-tetra3rs_mp_v1.0.0-${{github.run_id}}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build logs on failure
        if: failure()
        run: |
          echo "=== Loop devices ==="
          sudo losetup -l
          echo "=== Mounted filesystems ==="
          mount | grep pi || true
          echo "=== Disk space ==="
          df -h
